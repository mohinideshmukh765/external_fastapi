<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>

    <style>

        table{
            border-collapse: collapse;
            width: 100%;
        }

        th,td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

        th{
            background-color:#f2f2f2;
        }

    </style>

</head>

<body>

<h1>Prediction History</h1>

<table>

<tr>
    <th>ID</th>
    <th>Pregnancies</th>
    <th>Glucose</th>
    <th>Blood Pressure</th>
    <th>Skin Thickness</th>
    <th>Insulin</th>
    <th>BMI</th>
    <th>Pedigree</th>
    <th>Age</th>
    <th>Prediction</th>
</tr>

{% for row in records %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td>{{ row[5] }}</td>
    <td>{{ row[6] }}</td>
    <td>{{ row[7] }}</td>
    <td>{{ row[8] }}</td>
    <td>{{ row[9] }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">
    <button>
        Home
    </button>
</a>

</body>
</html>
