<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction</title>
</head>
<body>

<h1>Diabetes Prediction System</h1>

<form action="/predict" method="post">

<input type="number" name="pregnancies" placeholder="Pregnancies"><br><br>

<input type="number" name="glucose" placeholder="Glucose"><br><br>

<input type="number" name="bloodpressure" placeholder="Blood Pressure"><br><br>

<input type="number" name="skinthickness" placeholder="Skin Thickness"><br><br>

<input type="number" name="insulin" placeholder="Insulin"><br><br>

<input type="number" step="0.01" name="bmi" placeholder="BMI"><br><br>

<input type="number" step="0.01" name="pedigree" placeholder="Pedigree"><br><br>

<input type="number" name="age" placeholder="Age"><br><br>

<button type="submit">
Predict
</button>

<br>

<a href="/history">
    <button type="button">
        View Prediction History
    </button>
</a>
</form>

</body>
</html>
